<button (click)="cardClick.emit()" class="text-left w-full h-full">
  <div
    class="flex flex-col p-5 bg-white border border-dark-200 rounded-xl shadow-sm hover:shadow-md transition-shadow h-full"
  >
    <div class="flex items-start justify-between mb-4">
      <div
        class="w-12 h-12 rounded-full bg-primary-100 flex items-center justify-center text-primary-700 font-bold text-lg shrink-0"
      >
        {{ techName()[0] | uppercase }}
      </div>

      @if (online()) {
        <span
          class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold bg-success-50 text-success-700 border border-success-200"
        >
          <span class="relative flex h-2 w-2">
            <span
              class="animate-ping absolute inline-flex h-full w-full rounded-full bg-success-400 opacity-75"
            ></span>
            <span
              class="relative inline-flex rounded-full h-2 w-2 bg-success-500"
            ></span>
          </span>
          Online
        </span>
      } @else {
        <span
          class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold bg-dark-100 text-dark-600 border border-dark-200"
        >
          <span
            class="relative inline-flex rounded-full h-2 w-2 bg-dark-400"
          ></span>
          Offline
        </span>
      }
    </div>
    <div class="flex flex-col mb-5">
      <span class="text-lg font-bold text-dark-900 truncate">{{
        techName()
      }}</span>
      <span class="text-sm text-dark-400 truncate">{{ serviceArea() }}</span>
    </div>
    <div
      class="pt-4 border-t border-dark-100 flex justify-between items-center mt-auto"
    >
      <span class="text-xs font-medium text-dark-400 uppercase tracking-wider"
        >Month Services</span
      >
      <span class="text-sm font-semibold text-dark-900">{{
        monthServices()
      }}</span>
    </div>
  </div>
</button>
