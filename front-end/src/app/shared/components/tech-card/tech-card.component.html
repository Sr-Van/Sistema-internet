<div
  class="flex flex-col p-5 bg-white border border-gray-200 rounded-xl shadow-sm hover:shadow-md transition-shadow h-full"
>
  <div class="flex items-start justify-between mb-4">
    <div
      class="w-12 h-12 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold text-lg shrink-0"
    >
      {{ techName()[0] | uppercase }}
    </div>

    @if (online()) {
      <span
        class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold bg-green-50 text-green-700 border border-green-200"
      >
        <span class="relative flex h-2 w-2">
          <span
            class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"
          ></span>
          <span
            class="relative inline-flex rounded-full h-2 w-2 bg-green-500"
          ></span>
        </span>
        Online
      </span>
    } @else {
      <span
        class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold bg-gray-50 text-gray-600 border border-gray-200"
      >
        <span
          class="relative inline-flex rounded-full h-2 w-2 bg-gray-400"
        ></span>
        Offline
      </span>
    }
  </div>

  <div class="flex flex-col mb-5">
    <span class="text-lg font-bold text-gray-900 truncate">{{
      techName()
    }}</span>
    <span class="text-sm text-gray-500 truncate">{{ serviceArea() }}</span>
  </div>

  <div
    class="pt-4 border-t border-gray-100 flex justify-between items-center mt-auto"
  >
    <span class="text-xs font-medium text-gray-500 uppercase tracking-wider"
      >Month Services</span
    >
    <span class="text-sm font-semibold text-gray-900">{{
      monthServices()
    }}</span>
  </div>
</div>
