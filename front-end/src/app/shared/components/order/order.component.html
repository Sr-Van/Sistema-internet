<div class="p-6 flex flex-col" style="height: 100%;">
  <div class="mb-4 h-[32px] flex items-center">
    <h2 class="text-xl font-semibold text-dark-800 truncate">
      Ordem de Serviço #{{ orderNumber() }}
    </h2>
  </div>
  <p class="text-dark-600 mb-4 line-clamp-2 h-[40px]" title="{{ description() }}">
    {{ description() }}
  </p>
  <div class="flex justify-between text-sm text-dark-400 mb-2 h-[20px] items-center">
    <span class="truncate">Status:
      <span
        class="font-medium"
        [class.text-green-600]="status() === 'Concluida'"
        >{{ status() }}</span
      ></span
    >
    <span class="truncate ml-2">Data: {{ date() }}</span>
  </div>
  <div class="flex justify-between text-sm text-dark-400 h-[20px] items-center">
    <span class="truncate">Técnico:
      <span class="font-medium text-dark-700">{{ technician() }}</span></span
    >
    <span class="truncate ml-2">Cliente: {{ clientName() }}</span>
  </div>
  <div class="mt-auto pt-6">
    <button
      class="w-full bg-primary-500 text-white py-2 px-4 rounded-md hover:bg-primary-600 transition-colors duration-300"
      (click)="detailsClick.emit()"
    >
      Detalhes
    </button>
  </div>
</div>
